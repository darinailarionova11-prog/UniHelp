<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🌍 CareMap</h2>

    <button onclick="location.href='map.html'">🗺️ Map</button>
    <button onclick="location.href='explore.html'">🔍 Explore</button>
    <button onclick="location.href='add.html'">➕ Add Problem</button>
    <button class="active">👤 Profile</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="card glass profile">

      <label for="upload">
        <img id="profileImg" class="profile-pic" src="https://via.placeholder.com/150">
      </label>
      <input type="file" id="upload" hidden onchange="uploadImage(event)">

      <h2 id="username"></h2>

      <p id="locationText">📍 Loading location...</p>

      <div class="stats">
        <div><b id="myCount">0</b><br>My Problems</div>
        <div><b id="savedCount">0</b><br>Saved</div>
      </div>

      <button onclick="location.href='add.html'">➕ Add Problem</button>
      <button onclick="logout()">Logout</button>

    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
