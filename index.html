<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UniHelp</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div class="glass card">
  <h1>Unihelp</h1>

  <p>Don’t be a horse, be a unicorn, help people out 🦄</p>

  <p class="warning">
  ⚠️ Моля не публикувайте сериозни проблеми, които изискват помощта на 112
  </p>

  <input id="user" placeholder="Username">
  <button onclick="login()">Login / Sign Up</button>
</div>

<script>
function login(){
  let u=document.getElementById("user").value;
  if(!u) return alert("Enter username!");
  localStorage.setItem("user",u);
  location.href="map.html";
}
</script>

</body>
</html>
