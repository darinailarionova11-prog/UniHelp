<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Problem</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="navbar">
    <h2>Add Problem</h2>
    <button class="theme-toggle" onclick="toggleTheme()">🌗</button>
  </header>

  <main class="card glass form-container">

    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" placeholder="Enter problem title">
    </div>

    <div class="form-group">
      <label for="desc">Description</label>
      <textarea id="desc" placeholder="Describe the problem"></textarea>
    </div>

    <div class="form-group">
      <label for="img">Image URL</label>
      <input id="img" type="url" placeholder="Optional image link">
    </div>

    <div class="button-group">
      <button class="secondary" onclick="useMyLocation()">📍 Use My Location</button>
      <button class="primary" onclick="saveProblem()">Publish</button>
    </div>

    <p id="locText" class="location-text"></p>

  </main>

  <script src="script.js"></script>
</body>
</html>
